version: 1

script:
  - rm -rf AppDir
  - mkdir -p AppDir/usr/bin
  - cp target/x86_64-unknown-linux-gnu/release/yd AppDir/usr/bin/yd

AppDir:
  path: ./AppDir
  app_info:
    id: dev.yd.yd
    name: yd
    icon: utilities-terminal
    version: 0.0.0
    exec: usr/bin/yd
    exec_args: $@
  runtime:
    env:
      PATH: $APPDIR/usr/bin:$PATH

AppImage:
  arch: x86_64
