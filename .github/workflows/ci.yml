name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    # Ubuntu 22.04 keeps the glibc baseline compatible with common Ubuntu and Arch systems.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - run: cargo build --release --target x86_64-unknown-linux-gnu
      - run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release package/DEBIAN package/usr/bin
          cp target/x86_64-unknown-linux-gnu/release/yd release/yd
          cp release/yd yd-x86_64-unknown-linux-gnu
          tar -C release -czf yd-x86_64-unknown-linux-gnu.tar.gz yd
          tar -C release -cJf yd-x86_64-unknown-linux-gnu.tar.xz yd
          cp release/yd package/usr/bin/yd
          printf 'Package: yd\nVersion: %s\nSection: utils\nPriority: optional\nArchitecture: amd64\nMaintainer: 9sx77ssl <233811469+9sx77ssl@users.noreply.github.com>\nDescription: Personal terminal multitool\n' "$VERSION" > package/DEBIAN/control
          dpkg-deb --root-owner-group --build package "yd_${VERSION}_amd64.deb"
          sha256sum yd-x86_64-unknown-linux-gnu yd-x86_64-unknown-linux-gnu.tar.gz yd-x86_64-unknown-linux-gnu.tar.xz yd_"${GITHUB_REF_NAME#v}"_amd64.deb > SHA256SUMS
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            yd-x86_64-unknown-linux-gnu
            yd-x86_64-unknown-linux-gnu.tar.gz
            yd-x86_64-unknown-linux-gnu.tar.xz
            yd_*_amd64.deb
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            yd-x86_64-unknown-linux-gnu
            yd-x86_64-unknown-linux-gnu.tar.gz
            yd-x86_64-unknown-linux-gnu.tar.xz
            yd_*_amd64.deb
            SHA256SUMS
